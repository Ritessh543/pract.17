name: first_workflow

on: push

jobs: 
    firstjob:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Setup nodejs
              uses: actions/setup-node@v4
              with: 
                node-version: 18

            - name: Install dependencies
              run: npm install

            - name: run app
              run: npm start

            